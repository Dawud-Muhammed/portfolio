[[build]]
builder = "railpack"

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader",
  "npm ci"
]

[phases.build]
cmds = [
  "npm run build",
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache"
]

[deploy]
# Updated to run the worker in the background
startCommand = "php artisan config:clear && php artisan config:cache && php artisan migrate --force && (php artisan queue:work --tries=3 --timeout=90 & frankenphp php-server --listen :$PORT)"
