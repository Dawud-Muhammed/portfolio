[build]
builder = "railpack"

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader",
  "npm ci"
]

[phases.build]
# REMOVED config:cache and route:cache from here
cmds = [
  "npm run build"
]

[deploy]
[deploy]
# We chain them so the server only starts AFTER everything is 100% ready
startCommand = "php artisan config:clear && php artisan route:clear && php artisan view:clear && php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan migrate --force && (php artisan queue:work --tries=3 --timeout=90 & frankenphp php-server --listen :$PORT)"