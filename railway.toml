[build]
builder = "railpack"

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader",
  "npm ci"
]

[phases.build]
cmds = [
  "npm run build"
]

[deploy]
# All cache commands run at deploy-time so Railway env vars
# (APP_URL, RESEND_API_KEY, APP_KEY, DB_*, etc.) are available.
# storage:link --force re-creates the public/storage symlink every boot
# because Railway volumes are ephemeral for the symlink location.
startCommand = """
php artisan config:clear && \
php artisan route:clear && \
php artisan view:clear && \
php artisan config:cache && \
php artisan route:cache && \
php artisan view:cache && \
php artisan migrate --force --seed && \
php artisan storage:link --force && \
php artisan migrate --force && \
php artisan queue:work --tries=3 --timeout=90 --sleep=3 --max-time=3600 & \
frankenphp php-server --root public --listen 0.0.0.0:$PORT
"""
healthcheckPath = "/up"
