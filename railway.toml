[[build]]
builder = "railpack"

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader",
  "npm ci"
]

[phases.build]
cmds = [
  "npm run build",
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache"
]

[deploy]
# Updated to run the worker in the background
startCommand = "php artisan migrate --force && php artisan storage:link && (php artisan queue:work --tries=3 --timeout=90 & php artisan serve --host=0.0.0.0 --port=$PORT)"