<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Image unavailable</title>
  <desc id="desc">Fallback image shown when the requested asset is missing.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#fb923c" />
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)" />
  <g opacity="0.2">
    <circle cx="180" cy="140" r="130" fill="#fb923c" />
    <circle cx="1040" cy="680" r="190" fill="#f97316" />
  </g>
  <rect x="180" y="150" width="840" height="500" rx="28" fill="#0b1220" stroke="#334155" stroke-width="4" />
  <path d="M240 560l180-160 140 120 150-140 250 180" fill="none" stroke="#64748b" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" />
  <circle cx="430" cy="290" r="48" fill="#334155" />
  <rect x="240" y="610" width="720" height="14" rx="7" fill="url(#accent)" />
  <text x="600" y="700" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="36" font-weight="700">Image Not Available</text>
</svg>
